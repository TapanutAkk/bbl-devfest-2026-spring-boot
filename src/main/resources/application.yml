server:
  port: ${SERVER_PORT:8080}
  error:
    # Expose exception messages (e.g. "User 5 not found") in error JSON bodies
    include-message: always

spring:
  application:
    name: devfest
  # Load variables from .env at the project root (real OS env vars still win)
  config:
    import: "optional:file:.env[.properties]"
  # Default: embedded H2 (zero install). Override via env vars to use PostgreSQL
  # (docker compose sets these automatically).
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/devfest;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
