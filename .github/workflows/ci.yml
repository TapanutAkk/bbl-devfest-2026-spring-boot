# Basic CI: build + test on every push/PR, then verify the Docker image builds.
# A real deployment step (push to a registry, deploy to k8s/ECS) would follow
# the docker-build job, gated on the main branch.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build and run tests
        run: ./mvnw -B clean verify

      - name: Upload jar artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar

  docker-build:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t devfest-app:${{ github.sha }} .

      # Deploy example (disabled): push the image and roll out.
