services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-devfest}
      POSTGRES_USER: ${POSTGRES_USER:-devfest}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devfest}
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-devfest} -d ${POSTGRES_DB:-devfest}"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    ports:
      - "${SERVER_PORT:-8080}:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-devfest}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-devfest}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-devfest}
    depends_on:
      db:
        condition: service_healthy

volumes:
  db-data:
